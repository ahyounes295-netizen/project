<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض مشاريعي البرمجية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .project-card {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #007bff;
        }
        .icon { font-size: 40px; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>مشاريع السنة الثانية 🚀</h1>
        <p>اختر مشروعاً لمعاينته:</p>
        <div class="grid">
            <a href="Airport/airport1.html" class="project-card">
                <span class="icon">✈️</span>
                <span class="title">المطار (Airport)</span>
            </a>
            <a href="Cinema/cinema1.html" class="project-card">
                <span class="icon">🎬</span>
                <span class="title">السينما (Cinema)</span>
            </a>
            <a href="Clothing/clothing.html" class="project-card">
                <span class="icon">👕</span>
                <span class="title">الملابس (Clothing)</span>
            </a>
            <a href="Hotel/hotel.html" class="project-card">
                <span class="icon">🏨</span>
                <span class="title">الفندق (Hotel)</span>
            </a>
            <a href="Library/library.html" class="project-card">
                <span class="icon">📚</span>
                <span class="title">المكتبة (Library)</span>
            </a>
            <a href="Restaurant/restaurant.html" class="project-card">
                <span class="icon">🍔</span>
                <span class="title">المطعم (Restaurant)</span>
            </a>
            <a href="Login/Untitled-1.html" class="project-card">
                <span class="icon">🔐</span>
                <span class="title">تسجيل الدخول (Login)</span>
            </a>
        </div>
    </div>
</body>
</html>

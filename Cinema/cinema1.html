<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight Cinema | Book Tickets</title>
    <link rel="stylesheet" href="cinema2.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">🎬 STARLIGHT</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#movies">Now Showing</a></li>
                <li><a href="#book">Buy Tickets</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <span class="badge">Premiere</span>
            <h1>The Cosmic Void</h1>
            <p>Action • Sci-Fi • 2h 15m</p>
            <a href="#book" class="btn">Get Tickets</a>
        </div>
    </section>

    <section id="movies" class="movies-section">
        <h2>Now Showing</h2>
        <div class="movie-grid">
            
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=500&q=80" alt="Movie Poster" class="poster">
                <div class="movie-info">
                    <h3>The Cosmic Void</h3>
                    <p>Sci-Fi / Thriller</p>
                </div>
            </div>

            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=500&q=80" alt="Movie Poster" class="poster">
                <div class="movie-info">
                    <h3>Midnight Heist</h3>
                    <p>Action / Crime</p>
                </div>
            </div>

            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=500&q=80" alt="Movie Poster" class="poster">
                <div class="movie-info">
                    <h3>Echoes of Time</h3>
                    <p>Drama / Romance</p>
                </div>
            </div>

        </div>
    </section>

    <section id="book" class="booking-section">
        <div class="booking-container">
            <h2>Book Your Seats</h2>
            <form id="ticket-form">
                <div class="input-group">
                    <label for="movie-select">Select Movie</label>
                    <select id="movie-select" required>
                        <option value="" disabled selected>Choose a movie...</option>
                        <option value="The Cosmic Void">The Cosmic Void</option>
                        <option value="Midnight Heist">Midnight Heist</option>
                        <option value="Echoes of Time">Echoes of Time</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="input-group">
                    <label for="tickets">Number of Tickets ($12 each)</label>
                    <input type="number" id="tickets" min="1" max="10" value="1" required>
                </div>

                <button type="submit" class="btn block-btn">Confirm Booking</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Starlight Cinema. Grab your popcorn.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

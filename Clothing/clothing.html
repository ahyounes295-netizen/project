<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Apparel | Modern Fashion</title>
    <link rel="stylesheet" href="clothing2.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">Aura Apparel</div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">New Arrivals</a></li>
                <li class="cart">Cart <span id="cart-count">0</span></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>Summer Collection</h1>
        <p style="margin-bottom: 2rem; font-size: 1.2rem;">Elevate your everyday wardrobe.</p>
        <a href="#shop" class="btn">Shop Now</a>
    </section>

    <section id="shop" class="shop-section">
        <h2>Trending Now</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=500&q=80" alt="Classic White Tee" class="product-img">
                <div class="product-info">
                    <h3>Classic Cotton Tee</h3>
                    <span class="price">$25.00</span>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1551028719-00167b16eac5?auto=format&fit=crop&w=500&q=80" alt="Leather Jacket" class="product-img">
                <div class="product-info">
                    <h3>Vegan Leather Jacket</h3>
                    <span class="price">$120.00</span>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1539008835657-9e8e9680c956?auto=format&fit=crop&w=500&q=80" alt="Summer Dress" class="product-img">
                <div class="product-info">
                    <h3>Linen Slip Dress</h3>
                    <span class="price">$75.00</span>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1584273143981-41c073dfe8f8?auto=format&fit=crop&w=500&q=80" alt="Crossbody Bag" class="product-img">
                <div class="product-info">
                    <h3>Minimalist Crossbody</h3>
                    <span class="price">$45.00</span>
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Aura Apparel. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
